<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>RakshakAI - Login</title>
<script src="/tailwind-config.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Caudex:wght@400;700&amp;family=Forum&amp;family=Oswald:wght@300;400;500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Caudex:wght@100..900&amp;family=Forum:wght@100..900&amp;family=Oswald:wght@100..900&amp;display=swap" rel="stylesheet">
<style>
        body {
            font-family: 'Forum', serif;
            background-color: #faf8ff;
            background-image: radial-gradient(circle at 20% 30%, rgba(255, 171, 113, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(182, 77, 82, 0.03) 0%, transparent 40%);
        }
        .serif-headline { font-family: 'Caudex', serif; }
        .label-text { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .auth-card {
            backdrop-filter: blur(8px);
            border: 1px solid rgba(115, 118, 135, 0.1);
        }
    </style>
  <link rel="stylesheet" crossorigin href="/assets/global-CVBCfwqe.css">
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-6 text-on-surface">
<!-- Background Decoration -->
<div class="fixed inset-0 pointer-events-none opacity-40 overflow-hidden">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-secondary-fixed opacity-20 blur-3xl rounded-full"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-tertiary-fixed opacity-10 blur-3xl rounded-full"></div>
</div>
<main class="w-full max-w-md z-10">
<!-- Brand Header -->
<div class="text-center mb-10">
<div class="flex justify-center mb-6">
<img alt="RakshakAI Shield Logo" class="h-16 w-auto object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLvKEx2XdO-TG3q-fmvOAEX4DfoDWK7qp8W2qv4TiP4mc-ZQSdC7hcBRUzGdzoaKWsLgJXeqE07HwBKhCOdE3o2ftoD5wTeg_Rx_EiwO77LBwFHTvxYoo8QpaHEO66Axm0TgGA24_3amj2CG_Yh7LlbThv3MAZcJZGC4kBezHFqtAY1N04-OACAvqUd9ub_rm4aaHEmHm1AxOJU2AmMNUm_dVLl7DzsMC8e0XVmmH6KueJNQYgNlc8XccYMQ">
</div>
<h1 class="serif-headline text-4xl font-bold text-primary tracking-tight mb-2">RakshakAI</h1>
<p class="text-on-surface-variant text-lg font-light tracking-wide italic">Intelligent compliance. Zero manual triage.</p>
</div>
<!-- Login Card -->
<div class="auth-card bg-surface-container-lowest rounded-lg p-8 shadow-sm">
<form class="space-y-6" id="loginForm" onsubmit="handleLogin(event)">
<!-- Employee ID Field -->
<div>
<label class="label-text block text-xs font-medium text-outline mb-2" for="employee-id">Employee ID</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">badge</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface border-b border-outline-variant focus:border-secondary focus:ring-0 transition-colors text-body-md outline-none" id="employee-id" name="employee-id" placeholder="CAN-XXXXX" required="" type="text">
</div>
</div>
<!-- Password Field -->
<div>
<label class="label-text block text-xs font-medium text-outline mb-2" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-surface border-b border-outline-variant focus:border-secondary focus:ring-0 transition-colors text-body-md outline-none" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<!-- Branch Selection -->
<div>
<label class="label-text block text-xs font-medium text-outline mb-2" for="branch">Branch</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">account_balance</span>
<select class="w-full pl-10 pr-4 py-3 bg-surface border-b border-outline-variant focus:border-secondary focus:ring-0 transition-colors text-body-md outline-none appearance-none" id="branch" name="branch" required="">
<option disabled="" selected="" value="">Select Branch</option>
<option value="head-office">Head Office</option>
<option value="mumbai">Mumbai</option>
<option value="delhi">Delhi</option>
<option value="chennai">Chennai</option>
<option value="hyderabad">Hyderabad</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- Actions -->
<div class="pt-4 space-y-4">
<button class="w-full bg-secondary hover:bg-on-secondary-container text-on-secondary py-3.5 rounded-sm label-text text-sm font-medium transition-all duration-300 shadow-sm hover:shadow-md active:scale-[0.98]" type="submit">
                        Sign In
                    </button>
<div class="text-center">
<a class="text-sm text-secondary hover:text-on-secondary-container transition-colors font-medium underline decoration-secondary/30 underline-offset-4" href="#">
                            Forgot password?
                        </a>
</div>
</div>
</form>
</div>
<!-- Decorative Footer -->
<footer class="mt-12 text-center space-y-2">
<div class="h-px w-16 bg-outline-variant mx-auto mb-4"></div>
<p class="label-text text-[10px] text-outline-variant uppercase tracking-[0.2em]">
                Secured by RakshakAI | Canara Bank Internal Portal
            </p>
</footer>
</main>
<!-- Success Message Overlay (Hidden) -->
<div class="fixed inset-0 bg-surface/90 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500" id="successOverlay">
<div class="text-center">
<span class="material-symbols-outlined text-secondary text-6xl mb-4" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<h2 class="serif-headline text-2xl text-primary">Identity Verified</h2>
<p class="text-on-surface-variant italic mt-2">Entering the dashboard...</p>
</div>
</div>
<script>
        function handleLogin(event) {
            event.preventDefault();
            const btn = event.submitter;
            const overlay = document.getElementById('successOverlay');
            
            // Visual feedback
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            
            setTimeout(() => {
                overlay.classList.remove('opacity-0', 'pointer-events-none');
                setTimeout(() => {
                    // In a real app, this would route
                    console.log('Navigating to Home...');
                    location.href = '/home.html';
                }, 1500);
            }, 800);
        }

        // Add subtle focus animation to inputs
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.previousElementSibling.classList.add('text-secondary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.previousElementSibling.classList.remove('text-secondary');
            });
        });
    </script>
</body></html>
